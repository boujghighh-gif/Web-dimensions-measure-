<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Tape Measure</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Import Map to load Three.js reliably -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- This overlay wrapper is required for WebXR to show UI on top of the camera -->
    <div id="overlay">
        <div id="ui-container">
            <div id="instructions">Aim at the floor/table to start</div>
            <div id="measurement-text">0.0 cm</div>
            <button id="reset-button">Reset</button>
        </div>
    </div>

    <!-- Load our application logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
